<div class="container">
    <h2>Tenants</h2>
    <button (click)="openCreateForm()" class="btn btn-primary">+ Add Tenant</button>

    <div *ngIf="showForm" class="form-card">
        <h3>{{ isEditing ? 'Edit Tenant' : 'Add Tenant' }}</h3>
        <form (ngSubmit)="save()">
            <div class="form-group">
                <label>Full Name</label>
                <input [(ngModel)]="formData.fullName" name="fullName" required />
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input [(ngModel)]="formData.phone" name="phone" required />
            </div>
            <div class="form-group">
                <label>Email</label>
                <input [(ngModel)]="formData.email" name="email" type="email" required />
            </div>
            <div class="form-group">
                <label>National ID</label>
                <input [(ngModel)]="formData.nationalId" name="nationalId" required />
            </div>
            <button type="submit" class="btn btn-success">Save</button>
            <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
        </form>
    </div>

    <table class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Full Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>National ID</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let t of tenants">
                <td>{{ t.id }}</td>
                <td>{{ t.fullName }}</td>
                <td>{{ t.phone }}</td>
                <td>{{ t.email }}</td>
                <td>{{ t.nationalId }}</td>
                <td>
                    <button (click)="openEditForm(t)" class="btn btn-sm btn-warning">Edit</button>
                    <button (click)="deleteTenant(t.id)" class="btn btn-sm btn-danger">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>
